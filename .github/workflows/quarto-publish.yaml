on:
  push:
    branches: main
    paths:
      - .github/workflows/quarto-publish.yaml
      - _quarto.yml
      - _quarto-deploy.yml
      - index.qmd
      - license.qmd
      - references.bib
      - requirements-build.txt
      - _extensions/**
      - resources/**
      - src/**
      - animations/**/*_narrated.mp4
      - "*.pdf"
  workflow_dispatch:
    inputs:
      rebuild_pdf:
        description: Rebuild the PDF before publishing
        required: false
        type: boolean
        default: true

name: Render and Publish

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.36
          tinytex: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-build.txt

      # Quarto renders notebook-backed examples during both PDF and HTML builds.
      # Keep a slim, dedicated build environment instead of installing the full research stack.
      - name: Install Python build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Decide whether to rebuild PDF
        id: render-mode
        run: |
          rebuild_pdf=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.rebuild_pdf }}" == "true" ]]; then
            rebuild_pdf=true
          fi
          echo "rebuild_pdf=$rebuild_pdf" >> "$GITHUB_OUTPUT"

      - name: Reuse published PDF
        if: steps.render-mode.outputs.rebuild_pdf != 'true'
        run: |
          mkdir -p _book

          if git fetch origin gh-pages --depth=1; then
            if git cat-file -e origin/gh-pages:AI-Measurement-Science.pdf 2>/dev/null; then
              git show origin/gh-pages:AI-Measurement-Science.pdf > _book/AI-Measurement-Science.pdf
              echo "Reused published PDF from gh-pages."
            else
              echo "No published PDF found on gh-pages; continuing without one."
            fi
          else
            echo "Unable to fetch gh-pages; continuing without a reused PDF."
          fi

      - name: Render to pdf
        if: steps.render-mode.outputs.rebuild_pdf == 'true'
        run: quarto render --to pdf

      - name: Render to html
        run: quarto render --to html --profile deploy --no-clean

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
