project:
  type: book
  output-dir: _book
  preview:
    port: 4200

resources:
  - CNAME
  - "*.pdf"
  - "src/data/*.json"
  - "animations/**/*.mp4"
  
reference-location: document # footnotes in margin
citation-location: document # citations in margin
link-citations: true       # citations link to references

bibliography: references.bib
reference-section-title: References

crossref:
  fig-prefix: Figure
  tbl-prefix: Table
  sec-prefix: Section

language:
  crossref-ch-prefix: Chapter
  crossref-apx-prefix: Appendix

df-print: kable
filters:
  - pseudocode

format:
  html:
    theme:
      light: [flatly, resources/scss/global.scss]
      dark: [darkly, resources/scss/global.scss]
    published-title: "Updated"
    code-fold: false
    code-overflow: scroll
    code-line-numbers: true
    code-tools: true
    code-copy: True
    mathjax: 
      macros:
        mathbbm: ["\\mathbbm{#1}", 1]
    include-in-header:
      text: |
        <script>
        MathJax = {
          loader: {
            load: ['[tex]/boldsymbol']
          },
          tex: {
            tags: "all",
            inlineMath: [['$','$'], ['\\(','\\)']],
            displayMath: [['$$','$$'], ['\\[','\\]']],
            processEscapes: true,
            processEnvironments: true,
            packages: {
              '[+]': ['boldsymbol']
            }
          }
        };
        </script>
        <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js" type="text/javascript"></script>


  pdf:
    documentclass: scrreprt
    classoption: [numbers=noenddot,DIV=11]
    keep-tex: true
    include-in-header: resources/tex/preamble.tex
    include-after-body: resources/tex/postamble.tex
    template-partials:
      - resources/tex/partials/before-body.tex
    citeproc: true # use Pandoc's built-in citation processing
    toc-depth: 2 # level 1 headings (i.e. parts and chapters)
    toc-title: Table of Contents # title of table of contents
    links-as-notes: true # turn URLs into sidenotes
    citecolor: DarkGreen # tufte color
    linkcolor: DarkBlue # tufte color
    urlcolor: DarkGreen # tufte color
    code-overflow: wrap
    code-line-numbers: true
    include-before-body:
      text: |
        \RecustomVerbatimEnvironment{verbatim}{Verbatim}{
          showspaces = false,
          showtabs = false,
          breaksymbolleft={},
          breaklines
        }
        \numberwithin{algorithm}{chapter}
        \algrenewcommand{\algorithmiccomment}[1]{\hskip3em$\rightarrow$ #1}


knitr:
  opts_chunk:
    comment: "#>"
    collapse: TRUE
    cache.lazy: FALSE
    dev: "png"
    dpi: 300

execute:
  freeze: auto
  eval: false
  echo: true
  message: false
  warning: false
  error: false
  cache: false
  highlight-style: github
  tidy: true

book:
  title: "AI Measurement Science"
  subtitle: "A Science of Knowing Where AI Thrives, Where It Breaks, and How to Respond"
  author:
    - name: Sang T. Truong
      orcid: 0000-0002-7551-4378
    - name: Sanmi Koyejo
      orcid: 0000-0001-9039-3220
    
  date: last-modified
  repo-url: https://github.com/sangttruong/aims
  repo-actions: [source, issue]
  downloads: [pdf]
  sidebar:
    style: "docked"
    footer: license.qmd
  # google-analytics:
  # cookie-consent: true
  chapters:
    - index.qmd
    - part: "Measurement as Predictive Modeling"
      chapters:
        - src/chap1.qmd
        - src/chap2.qmd
        - src/chap3.qmd
    - part: "Measurement Reliability and Validity"
      chapters:
        - src/chap4.qmd
        - src/chap5.qmd
        - src/chap6.qmd
    - part: "Design, Governance, and Applications"
      chapters:
        - src/chap7.qmd
        - src/chap8.qmd
    - src/chap9.qmd
  appendices:
    - src/notation.qmd
